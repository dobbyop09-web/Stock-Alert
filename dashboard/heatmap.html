<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Market Heatmap</title>

    <style>
        :root{
            --bg:#0A0D12;
            --panel:#12161D;
            --panel2:#171C24;
            --line:#232A35;
            --text:#E6EAF0;
            --muted:#7A8494;
            --sans:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:var(--bg);
            color:var(--text);
            font-family:var(--sans);
        }

        .wrap{
            max-width:1500px;
            margin:auto;
            padding:22px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            border-bottom:1px solid var(--line);
            padding-bottom:16px;
            margin-bottom:20px;
            flex-wrap:wrap;
            gap:12px;
        }

        h1{
            font-size:16px;
            color:var(--text);
        }

        .sub{
            margin-top:6px;
            color:var(--muted);
            font-size:12px;
        }

        .navbar{
            display:flex;
            gap:8px;
        }

        .navbar a{
            text-decoration:none;
            color:var(--muted);
            background:var(--panel);
            border:1px solid var(--line);
            padding:8px 14px;
            border-radius:6px;
            font-size:12px;
        }

        .navbar a.active{
            background:#1B2A2E;
            border-color:#2DD4BF;
            color:#2DD4BF;
        }

        .toolbar{
            margin:18px 0 22px;
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            align-items:center;
        }

        .toolbar input,
        .toolbar select{
            padding:10px;
            border-radius:6px;
            border:1px solid var(--line);
            background:var(--panel);
            color:var(--text);
            font-size:12px;
            font-family:var(--sans);
        }

        .toolbar input{
            width:260px;
        }

        .toolbar select{
            cursor:pointer;
        }

        .toolbar select:focus,
        .toolbar input:focus{
            outline:none;
            border-color:#2DD4BF;
        }

        .legend{
            display:flex;
            gap:14px;
            align-items:center;
            margin-left:auto;
            font-size:11px;
            color:var(--muted);
        }

        .legend .sw{
            display:inline-block;
            width:10px;
            height:10px;
            border-radius:2px;
            margin-right:5px;
            vertical-align:middle;
        }

        .heatmap{
            width:100%;
            height:78vh;
            min-height:500px;
            border:1px solid var(--line);
            background:var(--panel);
            overflow:hidden;
            position:relative;
        }

        .empty-state{
            position:absolute;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            color:var(--muted);
            font-size:13px;
        }

        .sector-label{
            font-size:11px;
            font-weight:600;
            fill:var(--muted);
            letter-spacing:.4px;
            text-transform:uppercase;
            pointer-events:none;
        }

        .tile-rect{
            stroke:#0A0D12;
            stroke-width:1.5px;
            cursor:pointer;
            transition:opacity .15s;
        }

        .tile-rect:hover{
            opacity:.85;
        }

        .tile-text{
            pointer-events:none;
            font-family:var(--sans);
        }

        .tooltip{
            position:fixed;
            pointer-events:none;
            background:#171C24;
            border:1px solid var(--line);
            border-radius:8px;
            padding:12px 14px;
            font-size:12px;
            color:var(--text);
            box-shadow:0 8px 24px rgba(0,0,0,.5);
            z-index:50;
            opacity:0;
            transition:opacity .1s;
            min-width:160px;
        }

        .tooltip .t-symbol{
            font-size:14px;
            font-weight:700;
            margin-bottom:6px;
        }

        .tooltip .t-row{
            display:flex;
            justify-content:space-between;
            gap:16px;
            color:var(--muted);
            padding:2px 0;
        }

        .tooltip .t-row span:last-child{
            color:var(--text);
            font-weight:600;
        }

        .tooltip .t-pos{ color:#22c55e !important; }
        .tooltip .t-neg{ color:#ef4444 !important; }

        @media (max-width:700px){
            .toolbar input{ width:100%; }
            .legend{ margin-left:0; width:100%; justify-content:flex-start; }
        }
    </style>

</head>

<body>

<div class="wrap">

    <div class="topbar">

        <div>
            <h1>Market Heatmap</h1>
            <p class="sub" id="updated">Loading...</p>
        </div>

        <nav class="navbar">
            <a href="index.html">Dashboard</a>
            <a href="heatmap.html" class="active">Heat Map</a>
        </nav>

    </div>

    <div class="toolbar">

        <input id="search" placeholder="Search symbol or sector...">

        <select id="sectorFilter">
            <option value="">All Sectors</option>
        </select>

        <select id="changeFilter">
            <option value="all">All Changes</option>
            <option value="gainers">Gainers (&gt; 0%)</option>
            <option value="losers">Losers (&lt; 0%)</option>
            <option value="strongGainers">Strong Gainers (&gt; 5%)</option>
            <option value="strongLosers">Strong Losers (&lt; -5%)</option>
        </select>

        <select id="sortBy">
            <option value="marketCap">Sort: Market Cap</option>
            <option value="changeDesc">Sort: Change % (High to Low)</option>
            <option value="changeAsc">Sort: Change % (Low to High)</option>
            <option value="symbol">Sort: Symbol (A-Z)</option>
        </select>

        <div class="legend">
            <span><span class="sw" style="background:#7f1d1d"></span>&lt; -5%</span>
            <span><span class="sw" style="background:#b91c1c"></span>-5% to -2%</span>
            <span><span class="sw" style="background:#ef4444"></span>-2% to 0%</span>
            <span><span class="sw" style="background:#22c55e"></span>0% to 2%</span>
            <span><span class="sw" style="background:#16a34a"></span>2% to 5%</span>
            <span><span class="sw" style="background:#166534"></span>&gt; 5%</span>
        </div>

    </div>

    <div id="heatmap" class="heatmap"></div>

</div>

<div class="tooltip" id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>

    let allRows = [];
    let sortMode = "marketCap";

    const tooltip = document.getElementById("tooltip");

    function color(change){
        if(change <= -5) return "#7f1d1d";
        if(change <= -2) return "#b91c1c";
        if(change < 0) return "#ef4444";
        if(change < 2) return "#22c55e";
        if(change < 5) return "#16a34a";
        return "#166534";
    }

    function fmtNum(n){
        if(n === undefined || n === null || isNaN(n)) return "-";
        if(Math.abs(n) >= 1e7) return (n/1e7).toFixed(2)+"Cr";
        if(Math.abs(n) >= 1e5) return (n/1e5).toFixed(2)+"L";
        return Number(n).toLocaleString("en-IN");
    }

    function applySort(rows){
        const sorted = [...rows];
        switch(sortMode){
            case "changeDesc":
                sorted.sort((a,b)=> b.changePercent - a.changePercent);
                break;
            case "changeAsc":
                sorted.sort((a,b)=> a.changePercent - b.changePercent);
                break;
            case "symbol":
                sorted.sort((a,b)=> a.symbol.localeCompare(b.symbol));
                break;
            default:
                sorted.sort((a,b)=> (b.marketCap||0) - (a.marketCap||0));
        }
        return sorted;
    }

    function getFilteredRows(){
        const q = document.getElementById("search").value.toUpperCase();
        const sector = document.getElementById("sectorFilter").value;
        const changeMode = document.getElementById("changeFilter").value;

        let rows = allRows.filter(s=>{

            const matchesQuery = q === "" ||
                s.symbol.toUpperCase().includes(q) ||
                (s.sheet||"").toUpperCase().includes(q);

            const matchesSector = sector === "" || s.sheet === sector;

            let matchesChange = true;
            const c = s.changePercent;
            if(changeMode === "gainers") matchesChange = c > 0;
            else if(changeMode === "losers") matchesChange = c < 0;
            else if(changeMode === "strongGainers") matchesChange = c > 5;
            else if(changeMode === "strongLosers") matchesChange = c < -5;

            return matchesQuery && matchesSector && matchesChange;
        });

        return applySort(rows);
    }

    function populateSectorFilter(){
        const select = document.getElementById("sectorFilter");
        const current = select.value;
        const sectors = [...new Set(allRows.map(r=>r.sheet).filter(Boolean))].sort();

        select.innerHTML = '<option value="">All Sectors</option>' +
            sectors.map(s=>`<option value="${s}">${s}</option>`).join("");

        if(sectors.includes(current)) select.value = current;
    }

    function render(){

        const container = document.getElementById("heatmap");
        container.innerHTML = "";

        const rows = getFilteredRows();

        if(rows.length === 0){
            const empty = document.createElement("div");
            empty.className = "empty-state";
            empty.textContent = "No symbols match the current filters.";
            container.appendChild(empty);
            return;
        }

        const width = container.clientWidth;
        const height = container.clientHeight;

        // Group into sectors for nested treemap
        const grouped = d3.groups(rows, d => d.sheet || "Other")
            .map(([sheet, children]) => ({ sheet, children }));

        const root = d3.hierarchy({ children: grouped }, d => d.children)
            .sum(d => d.marketCap || 0)
            .sort((a,b) => (b.value||0) - (a.value||0));

        d3.treemap()
            .size([width, height])
            .paddingOuter(3)
            .paddingTop(d => d.depth === 1 ? 18 : 0)
            .paddingInner(2)
            (root);

        const svg = d3.select(container)
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // Sector group backgrounds + labels
        const sectorGroups = svg.selectAll("g.sector")
            .data(root.children || [])
            .enter()
            .append("g")
            .attr("class", "sector");

        sectorGroups.append("rect")
            .attr("x", d => d.x0)
            .attr("y", d => d.y0)
            .attr("width", d => Math.max(0, d.x1 - d.x0))
            .attr("height", d => Math.max(0, d.y1 - d.y0))
            .attr("fill", "none")
            .attr("stroke", "#2A313D")
            .attr("stroke-width", 1);

        sectorGroups.filter(d => (d.x1 - d.x0) > 60)
            .append("text")
            .attr("class", "sector-label")
            .attr("x", d => d.x0 + 4)
            .attr("y", d => d.y0 + 13)
            .text(d => d.data.sheet);

        // Leaf tiles
        const nodes = svg.selectAll("g.tile")
            .data(root.leaves())
            .enter()
            .append("g")
            .attr("class", "tile")
            .attr("transform", d => `translate(${d.x0},${d.y0})`);

        nodes.append("rect")
            .attr("class", "tile-rect")
            .attr("width", d => Math.max(0, d.x1 - d.x0))
            .attr("height", d => Math.max(0, d.y1 - d.y0))
            .attr("fill", d => color(d.data.changePercent))
            .on("click", (e, d) => {
                window.open(
                    `https://www.screener.in/company/${d.data.symbol}/consolidated/`,
                    "_blank"
                );
            })
            .on("mousemove", (e, d) => {
                const c = d.data.changePercent;
                const cls = c >= 0 ? "t-pos" : "t-neg";
                tooltip.innerHTML = `
                    <div class="t-symbol">${d.data.symbol}</div>
                    <div class="t-row"><span>Sector</span><span>${d.data.sheet || "-"}</span></div>
                    <div class="t-row"><span>Price</span><span>${d.data.price !== undefined ? "₹"+fmtNum(d.data.price) : "-"}</span></div>
                    <div class="t-row"><span>Change</span><span class="${cls}">${Number(c).toFixed(2)}%</span></div>
                    <div class="t-row"><span>Market Cap</span><span>${d.data.marketCap ? "₹"+fmtNum(d.data.marketCap) : "-"}</span></div>
                `;
                tooltip.style.opacity = 1;
                tooltip.style.left = (e.clientX + 16) + "px";
                tooltip.style.top = (e.clientY + 16) + "px";
            })
            .on("mouseleave", () => {
                tooltip.style.opacity = 0;
            });

        // Native tooltip fallback — always available, even on the tiniest tiles
        nodes.append("title")
            .text(d => `${d.data.symbol} — ${Number(d.data.changePercent).toFixed(2)}%`);

        // Labels — font size scales with tile size instead of a hard show/hide cutoff
        nodes.each(function(d){
            const w = d.x1 - d.x0;
            const h = d.y1 - d.y0;

            // Only truly tiny slivers get nothing at all
            if(w < 18 || h < 12) return;

            const g = d3.select(this);
            const symFont = Math.max(8, Math.min(14, w / 5, h / 2.2));
            const label = truncateToWidth(d.data.symbol, w - 8, symFont);

            g.append("text")
                .attr("class", "tile-text")
                .attr("x", 5)
                .attr("y", symFont + 4)
                .attr("fill", "white")
                .style("font-size", symFont + "px")
                .style("font-weight", "bold")
                .text(label);

            // Only add the change% line if there's room below the symbol
            if(h > symFont + 16){
                const pctFont = Math.max(7, Math.min(12, symFont - 1));
                g.append("text")
                    .attr("class", "tile-text")
                    .attr("x", 5)
                    .attr("y", symFont + pctFont + 6)
                    .attr("fill", "white")
                    .style("font-size", pctFont + "px")
                    .text(`${Number(d.data.changePercent).toFixed(2)}%`);
            }
        });
    }

    function truncateToWidth(text, maxWidth, fontSize){
        const avgCharWidth = fontSize * 0.6;
        const maxChars = Math.max(1, Math.floor(maxWidth / avgCharWidth));
        if(text.length <= maxChars) return text;
        return text.slice(0, Math.max(1, maxChars - 1)) + "…";
    }

    async function load(){

        const res = await fetch("dashboard-data.json?t=" + Date.now());
        allRows = await res.json();

        document.getElementById("updated").textContent =
            "Last Updated : " + new Date().toLocaleString();

        populateSectorFilter();
        render();
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("sectorFilter").addEventListener("change", render);
    document.getElementById("changeFilter").addEventListener("change", render);
    document.getElementById("sortBy").addEventListener("change", function(){
        sortMode = this.value;
        render();
    });

    window.addEventListener("resize", () => {
        clearTimeout(window._rt);
        window._rt = setTimeout(render, 150);
    });

    load();

</script>

</body>
</html>
